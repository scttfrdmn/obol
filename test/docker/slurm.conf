# Minimal single-node Slurm config for the obol integration container.
# One node (localhost) acting as controller and compute. Two partitions map to
# the obol cloud/on-prem policy classes so the seam's fail-mode table has both.

ClusterName=obol-test
SlurmctldHost=localhost
SlurmUser=slurm
SlurmdUser=root

# The obol GATE shim.
JobSubmitPlugins=lua
Prolog=/usr/local/bin/obol-prolog.sh
Epilog=/usr/local/bin/obol-epilog.sh
PrologFlags=Alloc

# Ports / paths.
SlurmctldPort=6817
SlurmdPort=6818
SlurmctldPidFile=/run/slurm/slurmctld.pid
SlurmdPidFile=/run/slurm/slurmd.pid
SlurmdSpoolDir=/var/spool/slurmd
StateSaveLocation=/var/spool/slurmctld
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# Scheduling — keep it simple and fast for tests.
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core
# No cgroups in the container: linuxproc tracking + task/none avoids the
# cgroup/v2 + dbus requirements that fail inside an unprivileged container.
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2
# Accept the container's actual CPU layout instead of failing on a mismatch.
SlurmdParameters=config_overrides

# Accounting via slurmdbd (provides the account tree + completion feed).
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
JobAcctGatherType=jobacct_gather/none

# Timeouts kept short so the container starts and jobs cycle quickly.
SlurmctldTimeout=30
SlurmdTimeout=30
MessageTimeout=10
InactiveLimit=0
MinJobAge=2
KillWait=5

# One node, two partitions (cloud = fail-closed, onprem = fail-open in the shim).
NodeName=localhost CPUs=2 RealMemory=1000 State=UNKNOWN
PartitionName=cloud  Nodes=localhost Default=YES MaxTime=INFINITE State=UP
PartitionName=onprem Nodes=localhost MaxTime=INFINITE State=UP
