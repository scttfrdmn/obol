# cgroup.conf for the obol integration container.
# IgnoreSystemd=yes skips the dbus/systemd scope handshake that fails inside a
# container without a system dbus. Combined with a private cgroup namespace
# (docker run --privileged, default cgroupns), this lets slurmd start. Job
# execution uses task/none + proctrack/linuxproc (see slurm.conf), so no cgroup
# controllers are actually required for the tests.
CgroupPlugin=cgroup/v2
IgnoreSystemd=yes
