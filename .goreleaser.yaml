version: 2
project_name: obol
before:
  hooks:
    - go mod tidy
builds:
  - id: obold
    main: ./cmd/obold
    binary: obold
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: obol
    main: ./cmd/obol
    binary: obol
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Ship the Slurm seam and the ParallelCluster deploy bundle inside the
    # archive so a release is self-contained: deploy/parallelcluster/install-obol.sh
    # installs the seam from the extracted tree without a separate checkout.
    files:
      - LICENSE
      - README.md
      - seam/lua/obol_wire.lua
      - seam/lua/obol_transport.lua
      - seam/lua/job_submit.lua
      - seam/slurm/obol-prolog.sh
      - seam/slurm/obol-jobcomp.sh
      - seam/slurm/obol-epilog.sh
      - seam/README.md
      - deploy/parallelcluster/**/*
checksum:
  name_template: "checksums.txt"
changelog:
  use: github-native
