name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26"] # single supported toolchain (self-deployed daemon + CLI, not a library)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: gofmt check
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then echo "gofmt needed:"; echo "$diff"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: kernel coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./internal/...
      - name: report
        run: go tool cover -func=coverage.out | tail -1
