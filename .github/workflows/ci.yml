name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26"] # single supported toolchain (self-deployed daemon + CLI, not a library)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      # The seam tests (seam/lua) cross-validate the Lua wire module and exercise
      # the GATE shell-out fallback (#137) via a real lua interpreter; they SKIP
      # without one. Install lua5.4 + luasocket so they actually run in CI rather
      # than skip green. luasocket lets the wire cross-check use socket.unix; the
      # shell-out test forces the in-process transport to fail regardless.
      - name: install lua + luasocket
        run: sudo apt-get update && sudo apt-get install -y lua5.4 lua-socket
      - name: gofmt check
        run: |
          diff=$(gofmt -s -l .)
          if [ -n "$diff" ]; then echo "gofmt needed:"; echo "$diff"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
      - name: kernel coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./internal/...
      - name: report
        run: go tool cover -func=coverage.out | tail -1
