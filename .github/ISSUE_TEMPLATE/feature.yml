name: Feature / task
description: A unit of work tracked toward a milestone.
labels: ["type:feat"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should exist when this is done?
    validations: { required: true }
  - type: textarea
    id: rationale
    attributes:
      label: Design rationale
      description: Link to docs/SEAM_DESIGN.md section, or state the why.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? (tests, invariants, behavior)
    validations: { required: true }
